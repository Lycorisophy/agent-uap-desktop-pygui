# UAP 配置文件示例
# 复制为 uap.yaml 或 uap.local.yaml 使用

version: 1

# 应用配置
app:
  title: "UAP - 复杂系统未来势态量化预测统一智能体"
  width: 1280
  height: 800
  debug: false

# LLM 配置（与如意72兼容）
llm:
  provider: "ollama"  # ollama | minimax | deepseek | qwen
  base_url: "http://127.0.0.1:11434"
  model: "llama3.2"
  temperature: 0.6
  max_tokens: 4096
  api_key: null
  api_mode: "native"  # native | openai
  trust_env: null

# 嵌入模型配置（RAG/向量检索等；通常由本地 Ollama 等提供，与下方 llm.provider 独立）
# 说明：若 llm.provider 为远程 OpenAI 兼容且代码路径调用 OpenAICompatibleChatClient.create_embedding，
# 当前实现未对接 /v1/embeddings，会返回空向量并打日志；嵌入请优先使用本节的 embedding 服务。
embedding:
  model: "qwen3-embedding:8b"
  base_url: ""  # 空则使用 llm.base_url

# 存储配置
storage:
  # 项目存储根目录
  projects_root: ""  # 空则使用 ~/.uap/projects
  # MySQL 连接
  mysql:
    host: "localhost"
    port: 3306
    user: "root"
    password: ""
    database: "uap"
  # Redis 连接
  redis:
    host: "localhost"
    port: 6379
    password: null
    db: 0
  # Elasticsearch
  elasticsearch:
    hosts:
      - "http://localhost:9200"
    index_prefix: "uap"
  # Milvus（知识库向量库）
  # backend: lite=本地 Milvus Lite 文件（依赖 milvus_lite 包）；standalone=独立服务（如 Docker 映射 19530）
  milvus:
    host: "localhost"
    port: 19530
    collection_prefix: "uap"
    backend: "lite"
    use_tls: false
    token: ""
  # 图结构/关系：项目目录内 entity_graph.json（由 SystemModel 投影）；不依赖独立图数据库。
  # MinIO
  minio:
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    secure: false
    bucket_prefix: "uap"

# 预测配置
prediction:
  # 默认预测频率（秒），默认1小时
  default_frequency_sec: 3600
  # 默认预测时长（秒），默认3天
  default_horizon_sec: 259200
  # 客户端打开时自动预测
  auto_run_on_startup: true
  # 最大并发预测任务数
  max_concurrent_tasks: 3
  # 预测结果保留天数
  result_retention_days: 30

# 调度器配置
scheduler:
  enabled: true
  tick_interval_sec: 60  # 检查间隔
  max_projects_per_tick: 10

# 记忆与知识系统
memory:
  enabled: true
  # 向量检索
  vector_enabled: true
  # 事件存储
  event_index_enabled: true
  # 为 true 时：保存系统模型后同步写入项目目录 ``entity_graph.json``（由 SystemModel 投影，无 Neo4j）
  graph_enabled: true

# 智能体配置
agent:
  # 默认建模模式：react | plan | auto（API 每轮传入的 mode 优先于本字段）
  modeling_agent_mode: react
  # 单次用户发送内 ReAct 最大 LLM 决策轮数（设置页可调 1–32，默认 8）
  react_max_steps_default: 8
  # 单次用户发送（一次 modeling_chat）内允许的成功 ask_user 次数；默认 1 表示一问后暂停，等用户下一条消息（与 LangGraph 路由一致）
  react_max_ask_user_per_turn: 1
  # 建模追问卡片（ASK_USER）过期秒数；超时视为拒绝并仅写会话、不调 LLM（10–900）
  ask_user_card_timeout_seconds: 120
  # ReAct / Plan 单次建模墙钟上限（秒），避免长时间 ask_user 等导致裸 timeout
  react_max_time_seconds: 300
  plan_max_time_seconds: 300
  # 建模前意图/场景：当前句 + 向前 N 轮 user/assistant 发给分类模型（0=仅当前句、仍跑分类）
  modeling_intent_context_rounds: 2
  # 可选；与主 llm 按字段合并；注释掉或 null 则分类与主对话用同一模型
  # modeling_classifier_llm:
  #   provider: ollama
  #   model: qwen2.5:1.5b
  #   base_url: ""
  # 建模时注册 win11_read_file / write / delete / modify / move（项目工作区内）
  modeling_win11_fs_skills_enabled: true
  # 为 true 且本轮 business_success 时，将 DST 轨迹经 SkillGenerator 落盘为项目技能（额外 LLM）
  modeling_skill_solidification_enabled: false
  # 内置定时任务（默认开启，用于自动预测）
  builtin_scheduler_enabled: true

# 上下文压缩
context_compression:
  enabled: true
  context_token_budget: 32000
  pre_send_threshold: 0.85
